name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build release APKs
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Compute version tag
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "tag=v${VERSION}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Rename APKs with version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          OUTDIR="app/build/outputs/apk/release"
          for APK in "$OUTDIR"/app-*-release.apk; do
            ABI=$(basename "$APK" | sed 's/app-\(.*\)-release\.apk/\1/')
            cp "$APK" "$OUTDIR/BeatBridge-${TAG}-${ABI}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BeatBridge ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/BeatBridge-*.apk
          body: |
            ## BeatBridge ${{ steps.version.outputs.tag }}

            Auto-play music when your Bluetooth device connects.

            ### Install options

            | Method | Notes |
            |--------|-------|
            | **F-Droid** | Verified build from source, signed by F-Droid *(recommended)* |
            | **APK below** | Signed — built directly from this commit |
            | **Build yourself** | `git clone`, checkout this tag, `./gradlew assembleRelease` |

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md) for what's new.
