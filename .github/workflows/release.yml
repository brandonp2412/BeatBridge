name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.0.5)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APKs with version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          OUTDIR="app/build/outputs/apk/release"
          for APK in "$OUTDIR"/app-*-release-unsigned.apk; do
            ABI=$(basename "$APK" | sed 's/app-\(.*\)-release-unsigned\.apk/\1/')
            cp "$APK" "$OUTDIR/BeatBridge-${TAG}-${ABI}.apk"
          done
          if [ -f "$OUTDIR/app-release-unsigned.apk" ]; then
            cp "$OUTDIR/app-release-unsigned.apk" "$OUTDIR/BeatBridge-${TAG}-universal.apk"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: BeatBridge ${{ github.event.inputs.tag }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/BeatBridge-*.apk
          body: |
            ## BeatBridge ${{ github.event.inputs.tag }}

            Auto-play music when your Bluetooth device connects.

            ### Install options

            | Method | Notes |
            |--------|-------|
            | **F-Droid** | Verified build from source, signed by F-Droid *(recommended)* |
            | **APK below** | Unsigned — built directly from this tag's source |
            | **Build yourself** | `git clone`, checkout this tag, `./gradlew assembleRelease` |

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.event.inputs.tag }}/CHANGELOG.md) for what's new.
