    <path
      fill="#FFFFFF"
      d="M45,30 L70,24 L70,44 L65,45.5 L65,32 L50,36 L50,64
         Q50,72 42,72 Q34,72 34,64 Q34,56 42,56 Q46,56 50,58 L50,30 Z"/>
