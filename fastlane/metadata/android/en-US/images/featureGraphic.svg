<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A0A3D"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#18FFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle radial glow behind icon -->
  <radialGradient id="halo" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="512" cy="210" rx="320" ry="200" fill="url(#halo)"/>

  <!-- Bluetooth icon (large, centered) -->
  <g transform="translate(472, 80)" filter="url(#glow)">
    <line x1="40" y1="0"  x2="40" y2="160" stroke="#7C4DFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="40" y1="0"  x2="72" y2="30"  stroke="#7C4DFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="72" y1="30" x2="14" y2="80"  stroke="#7C4DFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="14" y1="80" x2="72" y2="130" stroke="#7C4DFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="72" y1="130" x2="40" y2="160" stroke="#7C4DFF" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Musical note (teal accent, overlapping BT icon) -->
  <g transform="translate(530, 88)" filter="url(#glow)">
    <rect x="0" y="0" width="8" height="48" rx="4" fill="#18FFFF"/>
    <ellipse cx="-7" cy="50" rx="14" ry="9" fill="#18FFFF" transform="rotate(-15 -7 50)"/>
  </g>

  <!-- App name -->
  <text x="512" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="88" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    Beat<tspan fill="url(#grad)">Bridge</tspan>
  </text>

  <!-- Tagline -->
  <text x="512" y="385"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="24" fill="#888" text-anchor="middle" letter-spacing="3">
    AUTO-PLAY WHEN YOUR DEVICE CONNECTS
  </text>

  <!-- Bottom accent line -->
  <rect x="312" y="412" width="400" height="3" rx="1.5" fill="url(#grad)" opacity="0.35"/>
</svg>
