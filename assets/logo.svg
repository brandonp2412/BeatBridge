<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#18FFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="130" rx="22" fill="#0D0D1A"/>

  <!-- Icon halo -->
  <circle cx="65" cy="65" r="50" fill="#7C4DFF" opacity="0.08"/>
  <circle cx="65" cy="65" r="36" fill="#7C4DFF" opacity="0.12"/>

  <!-- Bluetooth symbol -->
  <line x1="65" y1="26" x2="65" y2="104" stroke="#7C4DFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="65" y1="26" x2="81" y2="44" stroke="#7C4DFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="81" y1="44" x2="51" y2="65" stroke="#7C4DFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="51" y1="65" x2="81" y2="86" stroke="#7C4DFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="81" y1="86" x2="65" y2="104" stroke="#7C4DFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Musical note (overlaid, teal accent) -->
  <rect x="80" y="36" width="4" height="22" rx="2" fill="#18FFFF" filter="url(#glow)"/>
  <ellipse cx="77" cy="59" rx="6" ry="4" fill="#18FFFF" filter="url(#glow)" transform="rotate(-15 77 59)"/>

  <!-- "Beat" -->
  <text x="122" y="62"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="46" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Beat</text>

  <!-- "Bridge" in gradient -->
  <text x="239" y="62"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="46" font-weight="800" fill="url(#grad)" letter-spacing="-1">Bridge</text>

  <!-- Tagline -->
  <text x="124" y="92"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="11.5" fill="#666" letter-spacing="2.2">AUTO-PLAY WHEN YOUR DEVICE CONNECTS</text>

  <!-- Accent bar -->
  <rect x="124" y="100" width="350" height="2" rx="1" fill="url(#grad)" opacity="0.30"/>
</svg>
